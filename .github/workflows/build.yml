name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Configure git for Windows paths
        run: git config --global core.protectNTFS false

      - name: Clone SearXNG
        run: git clone --depth 1 https://github.com/searxng/searxng.git searxng-src

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install msgspec lxml babel flask flask-babel httpx pyyaml uvicorn
          python -m pip install -e ./searxng-src
          python -m pip install nuitka zstandard ordered-set

      - name: Print versions
        run: |
          python --version
          python -m nuitka --version

      - name: Build EXE
        shell: pwsh
        run: |
          python -m nuitka `
            --onefile `
            --assume-yes-for-downloads `
            --windows-console-mode=force `
            --include-package=searx `
            --include-package-data=searx `
            --output-filename=searxng-win.exe `
            launcher.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: searxng-win
          path: searxng-win.exe
          retention-days: 30
